name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint, test, assemble
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform + build-tools
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache --stacktrace

      - name: Lint (app)
        run: ./gradlew :app:lintDebug --no-configuration-cache --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-configuration-cache --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/testDebugUnitTest/**
          if-no-files-found: ignore

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: ignore

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
